<!DOCTYPE html>
<html lang="ru" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Portfolio{% endblock %}</title>
    <link rel="icon" href="{{ url_for('static', filename='img/favicon.ico') }}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    {% block head_extra %}{% endblock %}
</head>
<body class="d-flex flex-column min-vh-100 bg-dark text-body">
      <header class="sticky-top shadow-sm">
        <nav class="navbar navbar-expand-md navbar-dark bg-body-tertiary border-bottom border-secondary border-opacity-25">
          <div class="container">
            <a class="navbar-brand fw-semibold" href="{{ url_for('index') }}">Anna Levina</a>
            <button
              class="navbar-toggler"
              type="button"
              data-bs-toggle="collapse"
              data-bs-target="#mainNav"
              aria-controls="mainNav"
              aria-expanded="false"
              aria-label="Переключить навигацию"
            >
              <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="mainNav">
              <ul class="navbar-nav ms-auto gap-2 align-items-stretch align-items-md-center" id="portfolio-tabs">
                <li class="nav-item">
                  <a
                    class="nav-link rounded-2 px-3{% if request.endpoint == 'index' %} active bg-secondary{% endif %}"
                    {% if request.endpoint == 'index' %}aria-current="page"{% endif %}
                    href="{{ url_for('index') }}"
                  >Проекты</a>
                </li>
                <li class="nav-item">
                  <a
                    class="nav-link rounded-2 px-3{% if request.endpoint == 'about' %} active bg-secondary{% endif %}"
                    {% if request.endpoint == 'about' %}aria-current="page"{% endif %}
                    href="{{ url_for('about') }}"
                  >Обо мне</a>
                </li>
              </ul>
            </div>
          </div>
        </nav>
      </header>

    <main class="flex-grow-1">
        <div class="container py-4">
            {% block content %}{% endblock %}
        </div>
    </main>

    <footer class="py-4 border-top border-secondary border-opacity-25 mt-auto bg-body-tertiary">
      <div class="container text-center">
        <small class="text-body-secondary">© 2026 Anna Levina</small>
      </div>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
