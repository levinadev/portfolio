{% macro project_card(project) %}
<div class="col-12 col-md-6 col-lg-4 d-flex align-items-stretch">
  <div class="card h-100 w-100 border-secondary-subtle shadow-sm rounded-2 overflow-hidden d-flex flex-column">
    <div class="ratio ratio-16x9 bg-body-secondary">
      <img
        src="{{ url_for('static', filename='images/' ~ project.image) }}"
        class="object-fit-cover"
        alt="{{ project.img_alt | default(project.title) }}"
      >
    </div>
    <div class="card-body d-flex flex-column flex-grow-1 px-3 pt-3 pb-3">
      <h5 class="card-title fw-bold mb-2">{{ project.title }}</h5>
      <p class="card-text flex-grow-1 small text-body-secondary mb-3 lh-sm">{{ project.description }}</p>
      <div class="mt-auto w-100">
        {% if project.demo %}
        <div class="d-flex gap-2">
          <a href="{{ project.github }}" target="_blank" rel="noopener noreferrer" class="btn btn-outline-dark btn-sm flex-fill rounded-2">GitHub</a>
          <a href="{{ project.demo }}" target="_blank" rel="noopener noreferrer" class="btn btn-light border border-dark btn-sm flex-fill rounded-2 text-dark fw-semibold">Демо</a>
        </div>
        {% else %}
        <div class="d-flex gap-2">
          <a href="{{ project.github }}" target="_blank" rel="noopener noreferrer" class="btn btn-outline-dark btn-sm w-50 rounded-2">GitHub</a>
        </div>
        {% endif %}
      </div>
    </div>
  </div>
</div>
{% endmacro %}
